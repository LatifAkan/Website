<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator_style.css">
    <title>Calculator</title>
    <script src="source.js"></script>
</head>
<body>
    <div class="bar">
        <p id="top_bar">Calculator</p>
    </div>

    <div id="wrapper">
        
        <input type="number" id="input_field">

        <div class="clear">
            <button id="clear_all" class="content_value" onclick="button_clicked()">CLEAR ALL</button>
            <button id="del" class="content_value">DEL</button>
            <button id="operator_equal" class="content_value">=</button>
        </div>

        <div class="num_block_wrapper"> 
            <button id="num_7" class="content_value" onclick="button_clicked()" value="7">7</button>
            <button id="num_8" class="content_value" onclick="button_clicked()" value="8">8</button>
            <button id="num_9" class="content_value">9</button>
            <button id="operator_plus" class="content_value">+</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_4" class="content_value">4</button>
            <button id="num_5" class="content_value">5</button>
            <button id="num_6" class="content_value">6</button>
            <button id="operator_minus" class="content_value">-</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_1" class="content_value">1</button>
            <button id="num_2" class="content_value">2</button>
            <button id="num_3" class="content_value">3</button>
            <button id="operator_multiplication" class="content_value">*</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_0" class="content_value">0</button>
            <button id="operator_division" class="content_value">/</button>
        </div>    
    </div>

    <div class="bar">
        <a href="index.html" id="bottom_bar">Go back</a>
    </div>
</body>
</html>
