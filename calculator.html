<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator_style.css">
    <title>Calculator</title>
</head>
<body>
    <div id="top_bar">
        <a href="index.html">Calculator</a>
    </div>

    <div id="wrapper">
        
        <input type="number" id="">

        <div class="clear">
            <button id="clear_all" class="content_value">CLEAR ALL</button>
            <button id="del" class="content_value">DEL</button>
            <button id="equal" class="content_value">=</button>
        </div>

        <div class="num_block_wrapper"> 
            <button id="num_block_style" class="content_value">7</button>
            <button id="num_block_style" class="content_value">8</button>
            <button id="num_block_style" class="content_value">9</button>
            <button id="num_block_style_operator" class="content_value">+</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_block_style" class="content_value">4</button>
            <button id="num_block_style" class="content_value">5</button>
            <button id="num_block_style" class="content_value">6</button>
            <button id="num_block_style_operator" class="content_value">-</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_block_style" class="content_value">1</button>
            <button id="num_block_style" class="content_value">2</button>
            <button id="num_block_style" class="content_value">3</button>
            <button id="num_block_style_operator" class="content_value">*</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_block_style" class="content_value">0</button>
            <button id="num_block_style_operator" class="content_value">/</button>
        </div>    
    </div>

    <div class="bottom_bar">
        <a href="index.html">Go back</a>
    </div>
</body>
</html>
