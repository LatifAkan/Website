<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator_style.css">
    <title>Calculator</title>
</head>
<body>
    <div id="top_bar">
        <a href="index.html">Calculator</a>
    </div>

    <div id="wrapper">
        
        <input type="text">

        <div class="clear">
            <button id="clear_all">CLEAR ALL</button>
            <button id="del">DEL</button>
        </div>

        <div class="num_block_wrapper"> 
            <button id="num_block_style">7</button>
            <button id="num_block_style">8</button>
            <button id="num_block_style">9</button>
            <button id="num_block_style_operator">+</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_block_style">4</button>
            <button id="num_block_style">5</button>
            <button id="num_block_style">6</button>
            <button id="num_block_style_operator">-</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_block_style">1</button>
            <button id="num_block_style">2</button>
            <button id="num_block_style">3</button>
            <button id="num_block_style_operator">*</button>
        </div>
        <div class="num_block_wrapper">
            <button id="num_block_style">0</button>
            <button id="num_block_style_operator">/</button>
        </div>    
    </div>

    <div class="bottom_bar">
        <a href="index.html">Go back</a>
    </div>
</body>
</html>
